<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Latihan Mengetik 10 Jari</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --primary-color: #4CAF50;
            --container-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 800px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: #555;
        }

        .text-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5em;
            text-align: left;
            margin-bottom: 20px;
            line-height: 1.6;
            padding: 20px;
            background-color: #eef2f3;
            border-radius: 5px;
            border: 1px solid #ddd;
            user-select: none;
        }

        .text-input {
            width: 100%;
            height: 100px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2em;
            padding: 15px;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 5px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        .text-input:focus {
            border-color: var(--primary-color);
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 1.1em;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Warna untuk status huruf */
        .correct { color: #4CAF50; }
        .incorrect { color: #F44336; text-decoration: underline; background-color: #fce4e4; }
        .current { border-bottom: 2px solid #3498db; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Latihan Mengetik 10 Jari</h1>
        
        <div class="stats">
            <div>Waktu: <span id="time">60</span>s</div>
            <div>WPM: <span id="wpm">0</span></div>
            <div>Akurasi: <span id="accuracy">100</span>%</div>
        </div>

        <div id="text-display" class="text-display"></div>
        
        <textarea id="text-input" class="text-input" placeholder="Mulai mengetik di sini..." autofocus></textarea>
        
        <button id="restart-btn">Ulangi Latihan</button>
    </div>

    <script>
        const texts = [
            "Mengetik dengan sepuluh jari adalah keterampilan yang sangat berguna untuk meningkatkan produktivitas kerja sehari-hari. Mulailah dengan menempatkan jari-jari pada posisi dasar ASDF dan JKL;.",
            "Fokuslah pada akurasi terlebih dahulu sebelum mencoba untuk meningkatkan kecepatan mengetik Anda. Jangan sering melihat ke arah keyboard agar memori otot jari Anda semakin terlatih.",
            "Latihan yang konsisten setiap hari selama lima belas menit akan memberikan hasil yang jauh lebih baik daripada berlatih selama berjam-jam tetapi hanya dilakukan sesekali saja."
        ];

        const textDisplay = document.getElementById('text-display');
        const textInput = document.getElementById('text-input');
        const timeDisplay = document.getElementById('time');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');
        const restartBtn = document.getElementById('restart-btn');

        let timeLeft = 60;
        let timeElapsed = 0;
        let timer = null;
        let isTyping = false;
        let correctCharacters = 0;
        let totalTypedCharacters = 0;

        function getRandomText() {
            const randomIndex = Math.floor(Math.random() * texts.length);
            return texts[randomIndex];
        }

        function renderNewText() {
            textDisplay.innerHTML = '';
            const text = getRandomText();
            text.split('').forEach(char => {
                const charSpan = document.createElement('span');
                charSpan.innerText = char;
                textDisplay.appendChild(charSpan);
            });
            textInput.value = '';
        }

        function startTimer() {
            if (!isTyping) {
                isTyping = true;
                timer = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        timeElapsed++;
                        timeDisplay.innerText = timeLeft;
                        calculateStats();
                    } else {
                        clearInterval(timer);
                        textInput.disabled = true;
                    }
                }, 1000);
            }
        }

        function calculateStats() {
            // Kalkulasi WPM: (Total karakter benar / 5) / menit
            const wpm = Math.round((((correctCharacters / 5) / timeElapsed) * 60) || 0);
            wpmDisplay.innerText = wpm;

            // Kalkulasi Akurasi
            const accuracy = Math.round((correctCharacters / totalTypedCharacters) * 100 || 100);
            accuracyDisplay.innerText = accuracy;
        }

        textInput.addEventListener('input', () => {
            startTimer();
            
            const arrayText = textDisplay.querySelectorAll('span');
            const arrayValue = textInput.value.split('');

            correctCharacters = 0;
            totalTypedCharacters = arrayValue.length;
            let allCorrect = true;

            arrayText.forEach((charSpan, index) => {
                const character = arrayValue[index];

                // Menghapus class current
                charSpan.classList.remove('current');

                if (character == null) {
                    charSpan.classList.remove('correct');
                    charSpan.classList.remove('incorrect');
                    allCorrect = false;
                    // Menambahkan indikator posisi kursor saat ini
                    if(index === arrayValue.length) {
                        charSpan.classList.add('current');
                    }
                } else if (character === charSpan.innerText) {
                    charSpan.classList.add('correct');
                    charSpan.classList.remove('incorrect');
                    correctCharacters++;
                } else {
                    charSpan.classList.remove('correct');
                    charSpan.classList.add('incorrect');
                    allCorrect = false;
                }
            });

            // Jika teks selesai dan benar semua sebelum waktu habis
            if (arrayValue.length === arrayText.length && allCorrect) {
                clearInterval(timer);
                textInput.disabled = true;
                calculateStats();
            }
        });

        restartBtn.addEventListener('click', () => {
            clearInterval(timer);
            timeLeft = 60;
            timeElapsed = 0;
            isTyping = false;
            correctCharacters = 0;
            totalTypedCharacters = 0;
            
            timeDisplay.innerText = timeLeft;
            wpmDisplay.innerText = '0';
            accuracyDisplay.innerText = '100';
            
            textInput.disabled = false;
            renderNewText();
            textInput.focus();
        });

        // Inisialisasi awal
        renderNewText();
    </script>
</body>
</html>
